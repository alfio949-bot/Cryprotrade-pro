<!DOCTYPE html>
<html lang="it">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>CryptoTrade Pro — Accesso</title>
  <script src="https://cdn.jsdelivr.net/npm/react@18.2.0/umd/react.production.min.js" crossorigin="anonymous"></script>
  <script src="https://cdn.jsdelivr.net/npm/react-dom@18.2.0/umd/react-dom.production.min.js" crossorigin="anonymous"></script>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet"/>
  <style>
    * { font-family: 'Inter', sans-serif; box-sizing: border-box; margin: 0; padding: 0; }
    body { background: #0a0e1a; color: white; min-height: 100vh; }
    #root { min-height: 100vh; display: flex; align-items: center; justify-content: center; }
    input, select { background: rgba(255,255,255,0.05); color: white; border: 1px solid rgba(255,255,255,0.12); border-radius: 8px; padding: 10px 12px; margin: 8px 0; font-size: 14px; width: 100%; }
    input:focus, select:focus { outline: none; border-color: #6366f1; }
    button { cursor: pointer; font-family: 'Inter', sans-serif; }
    .container { background: rgba(255,255,255,0.04); backdrop-filter: blur(12px); border: 1px solid rgba(255,255,255,0.08); border-radius: 16px; padding: 30px; width: 100%; max-width: 420px; }
    .btn { width: 100%; padding: 12px; border: none; border-radius: 8px; font-weight: 600; margin-top: 12px; font-size: 14px; }
    .btn-primary { background: linear-gradient(135deg, #6366f1, #a855f7); color: white; }
    .btn-secondary { background: transparent; color: #9ca3af; border: 1px solid rgba(255,255,255,0.1); }
    .title { font-size: 28px; font-weight: 800; background: linear-gradient(135deg, #6366f1, #a855f7, #06b6d4); -webkit-background-clip: text; -webkit-text-fill-color: transparent; margin-bottom: 8px; }
    .subtitle { font-size: 14px; color: #9ca3af; margin-bottom: 24px; }
    .error { background: rgba(248,113,113,0.1); border: 1px solid rgba(248,113,113,0.2); color: #f87171; padding: 10px 12px; border-radius: 8px; font-size: 12px; margin: 10px 0; }
    .success-box { background: rgba(34,197,94,0.1); border: 1px solid rgba(34,197,94,0.3); color: #22c55e; padding: 12px; border-radius: 8px; font-size: 13px; margin: 10px 0; }
    label { font-size: 12px; color: #9ca3af; display: block; margin-top: 12px; margin-bottom: 4px; }
    .passkey-box { background: linear-gradient(135deg, rgba(99,102,241,0.15), rgba(168,85,247,0.15)); border: 2px solid rgba(99,102,241,0.5); border-radius: 12px; padding: 20px; text-align: center; margin: 20px 0; }
    .passkey-code { font-family: 'Courier New', monospace; font-size: 26px; font-weight: 900; letter-spacing: 4px; color: #a78bfa; background: rgba(0,0,0,0.3); padding: 12px 20px; border-radius: 8px; display: inline-block; margin: 10px 0; border: 1px solid rgba(99,102,241,0.3); cursor: pointer; transition: background 0.2s; }
    .passkey-code:hover { background: rgba(99,102,241,0.2); }
    .warning-box { background: rgba(245,158,11,0.1); border: 1px solid rgba(245,158,11,0.3); color: #f59e0b; padding: 12px; border-radius: 8px; font-size: 12px; margin: 12px 0; line-height: 1.5; }
    .step-indicator { display: flex; align-items: center; gap: 8px; margin-bottom: 20px; }
    .step-dot { width: 8px; height: 8px; border-radius: 50%; background: rgba(99,102,241,0.3); }
    .step-dot.active { background: #6366f1; }
    .step-dot.done { background: #22c55e; }
    .badge { display: inline-block; background: rgba(34,197,94,0.15); border: 1px solid rgba(34,197,94,0.3); color: #22c55e; font-size: 10px; padding: 2px 8px; border-radius: 20px; margin-left: 8px; vertical-align: middle; }
  </style>
</head>
<body>
<div id="root"></div>
<script>
const { useState, useEffect } = React;

// ── CONFIG BACKEND ────────────────────────────────────────────────────────
const SUPABASE_URL    = "https://mezuesxglgdjpeaiicyb.supabase.co";
const SUPABASE_ANON   = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Im1lenVlc3hnbGdkanBlYWlpY3liIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODE0MDA5NDQsImV4cCI6MjA5Njk3Njk0NH0.2b06qN6PuIB80_0j8UV5-eRlH4hpHnN8epC1V--2LZw";
const DASHBOARD_URL   = "dashboard.html";

const store = {
  get: (k, d=null) => { try { return JSON.parse(localStorage.getItem(k)||"null")??d; } catch { return d; } },
  set: (k, v) => localStorage.setItem(k, JSON.stringify(v))
};

// Device fingerprint per riconoscere dispositivi già autorizzati
async function getDeviceFingerprint() {
  const raw = [navigator.userAgent, navigator.language, screen.width+'x'+screen.height, Intl.DateTimeFormat().resolvedOptions().timeZone].join('|');
  const buf = await crypto.subtle.digest('SHA-256', new TextEncoder().encode(raw));
  return Array.from(new Uint8Array(buf)).map(b=>b.toString(16).padStart(2,'0')).join('').slice(0,32);
}

async function sha256(msg) {
  const buf = await crypto.subtle.digest('SHA-256', new TextEncoder().encode(msg));
  return Array.from(new Uint8Array(buf)).map(b=>b.toString(16).padStart(2,'0')).join('');
}

// Genera passkey CTP-XXXX-XXXX
function generatePasskey() {
  const chars = 'ABCDEFGHJKLMNPQRSTUVWXYZ23456789';
  const seg = () => Array.from({length:4}, ()=>chars[Math.floor(Math.random()*chars.length)]).join('');
  return `CTP-${seg()}-${seg()}`;
}

// ── API CALLS BACKEND ────────────────────────────────────────────────────
async function apiRegister({ email, full_name, passkey, password }) {
  const passwordHash = await sha256(password + email.toLowerCase().trim());
  const res = await fetch(`${SUPABASE_URL}/functions/v1/register`, {
    method: 'POST',
    headers: { 'Content-Type': 'application/json', 'apikey': SUPABASE_ANON },
    body: JSON.stringify({ email, full_name, passkey, password_hash: passwordHash })
  });
  const data = await res.json();
  if (!res.ok) throw new Error(data.error || 'Errore server');
  return data;
}

async function apiVerifyPasskey({ email, passkey }) {
  const fp = await getDeviceFingerprint();
  const res = await fetch(`${SUPABASE_URL}/functions/v1/verify-passkey`, {
    method: 'POST',
    headers: { 'Content-Type': 'application/json', 'apikey': SUPABASE_ANON },
    body: JSON.stringify({ email, passkey, device_fingerprint: fp })
  });
  const data = await res.json();
  if (!res.ok) throw new Error(data.error || 'Passkey non valida');
  return data;
}

async function apiLogin({ email, password }) {
  // Login: verifica su Supabase auth
  const passwordHash = await sha256(password + email.toLowerCase().trim());
  const res = await fetch(`${SUPABASE_URL}/functions/v1/login`, {
    method: 'POST',
    headers: { 'Content-Type': 'application/json', 'apikey': SUPABASE_ANON },
    body: JSON.stringify({ email, password_hash: passwordHash })
  });
  const data = await res.json();
  if (!res.ok) throw new Error(data.error || 'Credenziali non valide');
  return data;
}

// ── COMPONENTE: RegisterForm ─────────────────────────────────────────────
function RegisterForm({ onSwitch, onSuccess }) {
  const [step, setStep] = useState(1);
  const [form, setForm] = useState({ email:'', password:'', confirmPw:'', full_name:'' });
  const [passkey, setPasskey] = useState('');
  const [loading, setLoading] = useState(false);
  const [err, setErr] = useState('');
  const [copied, setCopied] = useState(false);

  const doRegister = async e => {
    e.preventDefault();
    setErr('');
    if (form.password !== form.confirmPw) return setErr('Le password non coincidono.');
    if (form.password.length < 8) return setErr('Password minimo 8 caratteri.');
    setLoading(true);
    try {
      const pk = generatePasskey();
      setPasskey(pk);
      const res = await apiRegister({ email: form.email, full_name: form.full_name, passkey: pk, password: form.password });
      if (res.success) {
        setStep(2);
      }
    } catch(e) { setErr(e.message); }
    setLoading(false);
  };

  const copyPasskey = () => {
    navigator.clipboard?.writeText(passkey).then(()=>{ setCopied(true); setTimeout(()=>setCopied(false),2000); });
  };

  const doConfirm = () => {
    const userId = 'pending_' + Date.now();
    store.set('crypto_session', { userId, email: form.email });
    localStorage.setItem('user_logged_in','1');
    // Salva la passkey per l'access gate di dashboard.html
    localStorage.setItem('stored_passkey', passkey);
    localStorage.setItem('user_passkey_' + userId, passkey);
    onSuccess({ email: form.email, full_name: form.full_name });
  };

  if (step === 2) return React.createElement('div', null,
    React.createElement('h1', { className:'title' }, '✅ Registrazione Completata'),
    React.createElement('p', { className:'subtitle' }, 'Controlla la tua email — la passkey è stata inviata'),
    React.createElement('div', { className:'passkey-box' },
      React.createElement('p', { style:{color:'#9ca3af',fontSize:'12px',marginBottom:'8px',letterSpacing:'1px'} }, 'MASTER PASSKEY'),
      React.createElement('div', { className:'passkey-code', onClick: copyPasskey }, passkey),
      React.createElement('p', { className:'copy-hint', style:{color:'#6b7280',fontSize:'11px',marginTop:'4px'} }, copied ? '✅ Copiata!' : '👆 Tocca per copiare')
    ),
    React.createElement('div', { className:'warning-box' },
      '⚠️ Salva questa passkey! È l\'unico modo per accedere da nuovi dispositivi. È stata inviata anche alla tua email.'
    ),
    React.createElement('div', { className:'success-box' }, '📧 Email inviata a ' + form.email),
    React.createElement('button', { className:'btn btn-primary', onClick: doConfirm }, '🚀 Vai alla Dashboard')
  );

  return React.createElement('div', null,
    React.createElement('h1', { className:'title' }, 'Crea Account'),
    React.createElement('p', { className:'subtitle' }, React.createElement('span', null, 'Backend Sicuro'), React.createElement('span', { className:'badge' }, '🔐 Argon2id')),
    err && React.createElement('div', { className:'error' }, err),
    React.createElement('form', { onSubmit: doRegister },
      React.createElement('label', null, 'Nome completo'),
      React.createElement('input', { type:'text', placeholder:'Mario Rossi', value:form.full_name, onChange:e=>setForm({...form,full_name:e.target.value}), disabled:loading }),
      React.createElement('label', null, 'Email'),
      React.createElement('input', { type:'email', placeholder:'tua@email.it', value:form.email, onChange:e=>setForm({...form,email:e.target.value}), required:true, disabled:loading }),
      React.createElement('label', null, 'Password'),
      React.createElement('input', { type:'password', placeholder:'Minimo 8 caratteri', value:form.password, onChange:e=>setForm({...form,password:e.target.value}), required:true, disabled:loading }),
      React.createElement('label', null, 'Conferma Password'),
      React.createElement('input', { type:'password', placeholder:'Ripeti password', value:form.confirmPw, onChange:e=>setForm({...form,confirmPw:e.target.value}), required:true, disabled:loading }),
      React.createElement('button', { type:'submit', className:'btn btn-primary', disabled:loading },
        loading ? '⏳ Creazione account…' : '🔐 Crea Account Sicuro')
    ),
    React.createElement('button', { className:'btn btn-secondary', style:{marginTop:'12px'}, onClick:onSwitch }, 'Hai già un account? Accedi')
  );
}

// ── COMPONENTE: LoginForm ────────────────────────────────────────────────
function LoginForm({ onSwitch, onSuccess }) {
  const [form, setForm] = useState({ email:'', password:'' });
  const [loading, setLoading] = useState(false);
  const [err, setErr] = useState('');
  const [needsPasskey, setNeedsPasskey] = useState(false);
  const [passkey, setPasskey] = useState('');

  const doLogin = async e => {
    e.preventDefault();
    setLoading(true); setErr('');
    try {
      const fp = await getDeviceFingerprint();
      const res = await fetch(`${SUPABASE_URL}/functions/v1/login`, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json', 'apikey': SUPABASE_ANON },
        body: JSON.stringify({ email: form.email, password: form.password, device_fingerprint: fp })
      });
      const data = await res.json();
      if (!res.ok) {
        if (data.new_device) { setNeedsPasskey(true); }
        else throw new Error(data.error || 'Credenziali non valide');
      } else {
        store.set('crypto_session', { token: data.token, userId: data.user?.id, user: data.user });
        localStorage.setItem('user_logged_in','1');
        onSuccess(data.user);
      }
    } catch(e) { setErr(e.message); }
    setLoading(false);
  };

  const doPasskeyVerify = async e => {
    e.preventDefault();
    setLoading(true); setErr('');
    try {
      const res = await apiVerifyPasskey({ email: form.email, passkey });
      if (res.success) {
        store.set('crypto_session', { userId: res.user?.id, user: res.user });
        localStorage.setItem('user_logged_in','1');
        onSuccess(res.user);
      }
    } catch(e) { setErr(e.message); }
    setLoading(false);
  };

  if (needsPasskey) return React.createElement('div', null,
    React.createElement('h1', { className:'title' }, '🔒 Nuovo Dispositivo'),
    React.createElement('p', { className:'subtitle' }, 'Inserisci la tua Master Passkey per autorizzare questo dispositivo'),
    err && React.createElement('div', { className:'error' }, err),
    React.createElement('form', { onSubmit: doPasskeyVerify },
      React.createElement('label', null, 'Master Passkey'),
      React.createElement('input', { type:'text', placeholder:'CTP-XXXX-XXXX', value:passkey,
        onChange:e=>setPasskey(e.target.value.toUpperCase()), style:{fontFamily:'monospace',letterSpacing:'3px',fontSize:'18px'}, required:true, disabled:loading }),
      React.createElement('button', { type:'submit', className:'btn btn-primary', disabled:loading },
        loading ? '⏳ Verifica…' : '✅ Autorizza Dispositivo')
    ),
    React.createElement('button', { className:'btn btn-secondary', style:{marginTop:'12px'}, onClick:()=>setNeedsPasskey(false) }, '← Torna al Login')
  );

  return React.createElement('div', null,
    React.createElement('h1', { className:'title' }, 'Accedi'),
    React.createElement('p', { className:'subtitle' }, 'Bentornato su CryptoTrade Pro'),
    err && React.createElement('div', { className:'error' }, err),
    React.createElement('form', { onSubmit: doLogin },
      React.createElement('label', null, 'Email'),
      React.createElement('input', { type:'email', placeholder:'tua@email.it', value:form.email, onChange:e=>setForm({...form,email:e.target.value}), required:true, disabled:loading }),
      React.createElement('label', null, 'Password'),
      React.createElement('input', { type:'password', placeholder:'••••••••', value:form.password, onChange:e=>setForm({...form,password:e.target.value}), required:true, disabled:loading }),
      React.createElement('button', { type:'submit', className:'btn btn-primary', disabled:loading },
        loading ? '⏳ Accesso…' : '🔐 Accedi')
    ),
    React.createElement('button', { className:'btn btn-secondary', style:{marginTop:'12px'}, onClick:onSwitch }, 'Non hai un account? Registrati')
  );
}

// ── APP ROOT ─────────────────────────────────────────────────────────────
function App() {
  const [view, setView] = useState('login');
  const onSuccess = user => { window.location.href = DASHBOARD_URL; };
  return React.createElement('div', { style:{padding:'20px',width:'100%',display:'flex',justifyContent:'center'} },
    React.createElement('div', { className:'container' },
      view === 'login'
        ? React.createElement(LoginForm, { onSwitch:()=>setView('register'), onSuccess })
        : React.createElement(RegisterForm, { onSwitch:()=>setView('login'), onSuccess })
    )
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(React.createElement(App));
</script>
</body>
</html>
